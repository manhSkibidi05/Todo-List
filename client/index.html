<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./src/output.css">
    <title>Todo List</title>
</head>
<body class="font-Inter dark:bg-[#11131a] dark:text-[#e1e2eb] bg-[#fefcff] transition-all duration-300 ease-linear flex">
    <!-- Phần header -->
    <header class="header min-w-70 h-screen relative">
        <!-- Phần bar -->
        <section class="bar p-2">
            <h1 class="bar-title text-Primary text-3xl font-bold p-4 text-center mb-2">Focus & Flow</h1>
            <div class="bar-btn grid grid-cols-1 gap-2">
                <button class="bar-btn__tasks text-start p-2 bg-Primary rounded-xl text-md text-[#fefcff] cursor-pointer">
                    <i class="fa-regular fa-circle-check mr-2"></i>
                    Tasks
                </button>
                <button class="bar-btn__calendar text-start p-2  rounded-xl text-md cursor-pointer">
                    <i class="fa-regular fa-calendar mr-2"></i>
                    Calendar
                </button>
                <button class="bar-btn__categories text-start p-2  rounded-xl text-md cursor-pointer">
                    <i class="fa-solid fa-layer-group mr-2"></i>
                    Categories
                </button>
                <button class="bar-btn__settings text-start p-2  rounded-xl text-md cursor-pointer">
                    <i class="fa-solid fa-gear mr-2"></i>
                    Settings
                </button>
            </div>
        </section>

        <!-- btn-dark -->
        <button class="btn-dark absolute bottom-5 right-2 px-4 py-2 rounded-xl dark:bg-[#191c22] bg-[#e7e8f1] text-sm cursor-pointer">
            <i class="fa-regular fa-moon mr-2"></i>
            Switch
        </button>
    </header>

    <!-- Phần main -->
    <main class="main dark:bg-[#191c22] bg-[#e7e8f1] h-screen w-screen p-4">
        <!-- Phần task  -->
        <section class="tasks">
            <div class="tasks-block flex m-3 gap-2 ">
                <h2 class="tasks-block__title text-2xl font-bold me-auto">List Tasks</h2>
                <input class="tasks-block__search outline-0 dark:bg-[#11131a] bg-[#fefcff] text-Neutral rounded-2xl text-xs dark:text-[#e1e2eb] px-2 w-1/3" type="text" name="search" id="" placeholder="Search tasks...">
                <button class="tasks-block__add cursor-pointer rounded-2xl text-xs bg-Primary px-4 py-2 text-[#fefcff]">
                    <i class="fa-solid fa-plus mr-2"></i>
                    Add Task
                </button>
            </div>

            <div class="tasks-filter inline-flex mt-3 gap-5 bg-[#fefcff] dark:bg-[#11131a] rounded-2xl">
                <button class="tasks-filter__all px-6 py-3 bg-Primary text-[#fefcff] text-xs rounded-2xl cursor-pointer">All</button>
                <button class="tasks-filter__doing px-6 py-3  text-xs rounded-2xl cursor-pointer">Unfinished</button>
                <button class="tasks-filter__done px-6 py-3  text-xs rounded-2xl cursor-pointer">Done</button>
            </div>

            <div class="tasks-main">
                
            </div>
            
        </section>
    </main>























    <script>
        // xử lí phần dark mode
        const btnDark = document.querySelector(".btn-dark");
        btnDark.addEventListener("click", function () {
            document.documentElement.classList.toggle("dark");
        });
    </script>
</body>
</html>
